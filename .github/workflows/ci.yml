name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# ── Shared install step used by every job ─────────────────────────────────────
# Jobs use `npm install --prefer-offline` rather than `npm ci`. Reason:
# npm bug npm/cli#4828 — `npm ci` does not install platform-specific Rollup/SWC
# native binaries when the lockfile was generated on a different OS (we develop
# on macOS, CI runs on Linux). `npm install` resolves the right native dep per
# platform while still honouring the cache. Tradeoff: slightly slower than
# `npm ci`; lockfile is not strictly enforced.
# Actions are pinned to full commit SHAs (supply chain security — see AGENTS.md).

jobs:
  # ── 1. Typecheck ─────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm run typecheck

  # ── 2. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm run lint

  # ── 3. Format ─────────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm run format:check

  # ── 4. Unit tests + coverage ──────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npx vitest run --coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 5. Dependency vulnerability audit (production deps only) ─────────────────
  # Audit level is `critical` (not `high`) because Expo SDK 51 ships a CLI/build
  # toolchain (@expo/cli, @expo/config-plugins, xcode, tar, @xmldom/xmldom) with
  # known HIGH advisories that do not ship in the mobile binary — they are only
  # used at build time on developer machines and EAS Build runners. Revisit when
  # Expo SDK 52+ lands with refreshed transitives.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - run: npm audit --audit-level=critical --omit=dev

  # ── 6. Secrets scan ───────────────────────────────────────────────────────────
  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. Content validation (non-blocking — therapist content pending) ──────────
  content:
    name: Content validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - name: Validate safety-critical content
        run: npm run validate:content
        continue-on-error: true

  # ── 8. Expo config validation ─────────────────────────────────────────────────
  # The pre-pivot `next build` step is gone. EAS Build runs separately and is not
  # part of the per-PR check budget. This job validates the Expo config statically
  # so PRs that break app.json or break Expo Router's typed routes fail fast.
  expo-config:
    name: Expo config
    needs: [typecheck, lint, format, test, audit, secrets]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - run: npm install --prefer-offline --no-audit --no-fund
      - name: Validate app.json
        run: npx expo config --type public > /dev/null
